version: '3.8'

services:
  admin:
    build: ./admin
    container_name: ecommerce-shoestore-admin
    restart: always
    ports:
      - "5174:80"
    depends_on:
      - backend
  frontend:
    build: ./frontend
    container_name: ecommerce-shoestore-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: ecommerce-shoestore-backend
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/shoestore
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: ecommerce-shoestore-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
